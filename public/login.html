<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - Urbanspin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: radial-gradient(#E0F7FA 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .toggle-link {
            display: block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">&larr; Back</a>

    <div class="container">
        <div class="card login-card">
            <div class="login-header">
                <span class="icon" id="auth-icon">🔑</span>
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-desc" style="color: var(--text-secondary);">Enter your credentials to continue</p>
            </div>

            <form id="authForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. rider123" required>
                </div>

                <div class="input-group" id="phone-group" style="display: none;">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="e.g. +919876543210">
                </div>

                <div class="input-group" id="email-group" style="display: none;">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@mail.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn" id="submitBtn" style="margin-top: 10px;">Login to Ride</button>
                <div class="toggle-link" id="toggleMode">Don't have an account? Sign Up</div>
            </form>
        </div>
    </div>
    
    <script>
        const authForm = document.getElementById('authForm');
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const toggleMode = document.getElementById('toggleMode');
        const authTitle = document.getElementById('auth-title');
        const authDesc = document.getElementById('auth-desc');
        const emailGroup = document.getElementById('email-group');
        const phoneGroup = document.getElementById('phone-group');
        const phoneNumberInput = document.getElementById('phoneNumber');

        let isLogin = true;

        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                authTitle.innerText = "Welcome Back";
                authDesc.innerText = "Enter your credentials to continue";
                emailGroup.style.display = "none";
                emailInput.required = false;
                phoneGroup.style.display = "none";
                submitBtn.innerText = "Login to Ride";
                toggleMode.innerText = "Don't have an account? Sign Up";
            } else {
                authTitle.innerText = "Create Account";
                authDesc.innerText = "Join Urbanspin today";
                emailGroup.style.display = "block";
                emailInput.required = true;
                phoneGroup.style.display = "block";
                submitBtn.innerText = "Register";
                toggleMode.innerText = "Already have an account? Login";
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                username: usernameInput.value,
                password: passwordInput.value
            };

            if (!isLogin) {
                payload.email = emailInput.value;
                if (phoneNumberInput.value) payload.phoneNumber = phoneNumberInput.value;
            }

            submitBtn.textContent = isLogin ? "Logging in..." : "Registering...";
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";

            try {
                const endpoint = isLogin ? '/api/login' : '/api/register';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('user', data.username);
                    localStorage.setItem('token', data.token); // Store JWT securely
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(data.message || "Authentication failed");
                }
            } catch (err) {
                console.error(err);
                alert((isLogin ? "Login failed: " : "Registration failed: ") + err.message);

                submitBtn.textContent = isLogin ? "Login to Ride" : "Register";
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
            }
        });
    </script>
</body>

</html>
